        function tryEnterGame() {
            if (_prerollAdFinished && _unityInstanceReady && !_adIsPlaying) {

                loadingBar.style.display = "none";

                window.focus();

        // Load Unity instance
        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            var saved_progess = 0;
            createUnityInstance(canvas, config, (progress) => {

                progress = Math.round(progress * 100);
                if (saved_progess == progress) {
                    return;
                }
                saved_progess = progress;
                progressElement.style.width = progress + "%";
                text_percent = "Downloading file: " + progress + "%";
                progress_text.innerText = text_percent;
                if (progress >= 99) {
                    progress_text.innerText = "Game Loading ...";
                }
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                setTimeout(function() {
                    _unityInstanceReady = true;
                    tryEnterGame();
                }, 2000);
                loadingBar.style.display = "none";
                splash.style.display = "flex";
                window.focus();
            }).catch((message) => {
                alert(message);
            });
        };
